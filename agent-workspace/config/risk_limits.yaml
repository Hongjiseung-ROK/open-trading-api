# ============================================================================
# 리스크 한도 — propose.py(제안 시)와 approval_gate.py(실행 직전) 양쪽에서 강제한다.
# ============================================================================

# 실행 모드: paper(모의투자) | live(실거래)
#   모의투자(paper) 앱키가 입력되어 paper 모드로 검증 운용한다. 실제 자금 위험 0.
#   주문은 모의투자 계좌(my_paper_stock)로 전송되며 가상 자금으로 체결된다.
#   실거래 전환 시 mode: live 로 바꾼다 (그때도 주문은 사람 승인 게이트 경유).
mode: paper

# KIS 계좌 — 비워두면 kis_devlp.yaml 의 계좌번호를 사용한다.
account:
  cano: ""              # 계좌번호 앞 8자리
  acnt_prdt_cd: "01"    # 계좌상품코드 (종합계좌 = 01)

# 주문 하드 한도 (모의투자 검증용 — 가상자금 ₩30M 규모에 맞춰 상향.
# 실거래 전환 시 반드시 본인 자금규모에 맞게 보수적으로 낮출 것.)
limits:
  max_order_value_krw: 8000000     # 주문 1건 최대 금액 (원)
  max_qty_per_order: 2000          # 주문 1건 최대 수량 (주)
  max_open_proposals: 10           # 동시 대기 매매안 수
  daily_order_value_krw: 30000000  # 하루 누적 주문금액 상한 (원)
  allowed_sides: [buy, sell]
  watchlist_only: true             # watchlist.yaml 외 종목 주문 금지

# 목표 수익률(%) — 포트폴리오 매니저가 익절 기준으로 참고한다.
# ⚠️ 목표일 뿐 보장값이 아니다. 실현 손익은 시장 등락에 따라 결정된다.
target_return_pct: 20

# 모든 실주문은 approval_gate.py 를 통한 사람 승인 필수 (구조적으로 강제됨)
require_human_approval: true

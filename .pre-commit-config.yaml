# KIS open-trading-api — 시크릿 유출 방지 훅 (커밋·푸시 양 단계)
# 설치:  pre-commit install --hook-type pre-commit --hook-type pre-push
minimum_pre_commit_version: "3.2.0"
repos:
  - repo: local
    hooks:
      - id: kis-secret-guard
        name: KIS 시크릿 차단 (파일명 + 내용)
        entry: scripts/check-kis-secrets.sh
        language: script
        stages: [pre-commit, pre-push]
        pass_filenames: true
      - id: gitleaks
        name: gitleaks 보조 스캔 (설치 시에만 동작)
        entry: scripts/run-gitleaks.sh
        language: script
        stages: [pre-commit, pre-push]
        pass_filenames: true
